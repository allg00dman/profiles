vif_only: true
block_quic: true
hijack_dns:
- '*:53'
geoip_db_url: https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
proxy_latency_test_url: http://cp.cloudflare.com/generate_204
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
dns:
  bootstrap:
  - system
  upstreams:
    Domestic-DNS:
    - 223.5.5.5
    - 119.29.29.29
  forward:
  - domain_wildcard:
      match: '*'
      value: Domestic-DNS
bypass_tunnel_proxy:
- localhost
- '*.local'
policy_groups:
- external:
    name: Proxy
    type: select
    urls:

    filter: .*
    hidden: false
- select:
    name: Hong Kong
    policies:
    - Proxy
    flatten: true
    filter: (?i)(港|HK|Hong)
    hidden: false
- select:
    name: Taiwan
    policies:
    - Proxy
    flatten: true
    filter: (?i)(台|TW|Tai)
    hidden: false
- select:
    name: Singapore
    policies:
    - Proxy
    flatten: true
    filter: (?i)(新加坡|坡|狮城|SG|Singapore)
    hidden: false
- select:
    name: United States
    policies:
    - Proxy
    flatten: true
    filter: (?i)(美|洛杉矶|圣何塞|圣克拉拉|西雅图|硅谷|US|United States)
    hidden: false
- select:
    name: Netflix
    policies:
    - Singapore
    - Hong Kong
    - Taiwan
- select:
    name: YouTube
    policies:
    - United States
    - Singapore
    - Hong Kong
    - Taiwan
- select:
    name: Spotify
    policies:
    - Hong Kong
    - Singapore
    - United States
    - Taiwan
    - DIRECT
rules:
- protocol:
    match: stun
    policy: REJECT
- domain_suffix:
    match: push.apple.com
    policy: Hong Kong
- domain_keyword:
    match: courier
    policy: Hong Kong
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list
    policy: Netflix
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Spotify/Spotify.list
    policy: Spotify
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list
    policy: YouTube
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTubeMusic/YouTubeMusic.list
    policy: YouTube
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/OpenAI/OpenAI.list
    policy: United States
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Claude/Claude.list
    policy: United States
- rule_set:
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list
    policy: Taiwan
- rule_set:
    name: Apple
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple_All.list
    policy: DIRECT
- rule_set:
    name: LAN
    match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Lan/Lan.list
    policy: DIRECT
- geoip:
    match: CN
    policy: DIRECT
- default:
    policy: Proxy
